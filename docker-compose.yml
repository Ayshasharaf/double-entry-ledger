version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    environment:
      POSTGRES_USER: ledger_admin
      POSTGRES_PASSWORD: ledger1234
      POSTGRES_DB: ledger_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_admin -d ledger_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: