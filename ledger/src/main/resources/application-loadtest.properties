# Load-test profile: connect through PgBouncer (docker-compose) and use virtual threads.
# Run: docker compose up -d && mvn spring-boot:run -Dspring-boot.run.profiles=loadtest

spring.datasource.url=jdbc:postgresql://localhost:6432/ledger_db

spring.threads.virtual.enabled=true

# Size pool for concurrent virtual threads without exhausting Postgres.
# PgBouncer multiplexes many client connections onto a smaller server pool.
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

spring.datasource.hikari.data-source-properties.prepareThreshold=5
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true
